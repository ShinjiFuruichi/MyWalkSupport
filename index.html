<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>GPX Viewer</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

  <!-- CSS -->
  <link rel="stylesheet" href="static/style.css">
</head>

<body>
  <div id="fileSelector">
    <label for="gpxFileInput" class="fileBtn">コース選択</label>
    <input type="file" id="gpxFileInput" accept=".gpx">
  </div>

  <div id="setupPanel">
    <div class="setupBox">
      <div>目標時間（時間）</div>
      <input type="number" id="targetHourInput" value="22" min="0"> 時間
      <input type="number" id="targetMinInput" value="0" min="0" max="59"> 分
      <button id="startSetupBtn">設定</button>
    </div>
  </div>

  <div id="targetDisplay"></div>

  <div id="map"></div>

  <div id="status"></div>

  <!-- スタートボタン（常に表示） -->
  <button id="startBtn" class="floating-btn">▶</button>

  <button id="updateBtn" class="hidden">↻</button>
  <button id="endBtn" class="hidden">■</button>
  <button id="tagBtn" class="hidden">📍</button>
  <button id="clearBtn">リセット</button>
  <button id="saveBtn">💾</button>
  <button id="elevationBtn">⛰</button>

  <!-- 標高グラフ -->
  <div id="elevationContainer" class="hidden">
    <canvas id="elevationChart" width="300" height="120"></canvas>
  </div>

  <!-- 情報パネル -->
  <div id="infoPanel" class="panel hidden">

    <div id="courseName" class="panel-title"></div>

    <div class="panel-section">
      <div class="panel-title">📍 現在</div>
      <div id="progress"></div>
      <div id="remaining"></div>
    </div>

    <div class="panel-section">
      <div class="panel-title">🚩 次の目的地</div>
      <div id="next"></div>
    </div>

    <div class="panel-section">
      <div class="panel-title">⏱ 時間</div>
      <div id="timeInfo"></div>
    </div>

    <div id="result"></div>
  </div>

  <!-- タグメニュー -->
  <div id="tagPanel" class="tag-panel hidden">

    <div class="tag-header">
      <div class="tag-title">📍 タグ選択</div>
      <button id="closeTag" class="close-btn">✕</button>
    </div>

    <div id="tagContainer"></div>

  </div>

  <!-- Leaflet -->
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <!-- JS -->
  <script src="script.js"></script>
</body>
</html>

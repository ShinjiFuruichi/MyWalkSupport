<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>GPX Viewer</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

  <!-- CSS -->
  <link rel="stylesheet" href="static/style.css">
</head>

<body>
  <div id="map"></div>

  <!-- スタートボタン（常に表示） -->
  <button id="startBtn" class="floating-btn">▶</button>

  <button id="updateBtn" class="hidden">↻</button>
  <button id="endBtn" class="hidden">■</button>

  <!-- 情報パネル -->
  <div id="infoPanel" class="panel hidden">

    <div id="courseName" class="panel-title"></div>

    <div class="panel-section">
      <div class="panel-title">📍 現在</div>
      <div id="progress"></div>
      <div id="remaining"></div>
    </div>

    <div class="panel-section">
      <div class="panel-title">🚩 次の目的地</div>
      <div id="next"></div>
    </div>

    <div class="panel-section">
      <div class="panel-title">⏱ 時間</div>
      <div id="timeInfo"></div>
    </div>

    <div id="result"></div>
  </div>

  <!-- Leaflet -->
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <!-- JS -->
  <script src="script.js"></script>
</body>
</html>

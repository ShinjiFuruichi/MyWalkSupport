<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>GPX Viewer</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

  <!-- CSS -->
  <link rel="stylesheet" href="static/style.css">
</head>

<body>
  <div id="fileSelector" class="hidden">
    <label for="gpxFileInput" class="fileBtn">コース選択</label>
    <input type="file" id="gpxFileInput" accept=".gpx">
  </div>

  <div id="setupPanel" style="display:none;">
    <div class="setupBox">
      <div>スタート予定時間</div>
      <input type="time" id="startPlannedInput"><br>

      <label>
        <input type="radio" name="mode" value="time" checked>
        目標時間
      </label>

      <label>
        <input type="radio" name="mode" value="pace">
        初速
      </label>

      <div>目標時間</div>
      <input type="number" id="targetHourInput"> 時間
      <input type="number" id="targetMinInput"> 分

      <div class="pace-input-group">
        <label>目標初速（分/km）</label><br>
        <input id="paceMinInput" type="number" placeholder="分" class="pace-input">
        <input id="paceSecInput" type="number" placeholder="秒" class="pace-input">
      </div>

      <div class="rest-default-row">
        <span>休憩時間</span>
        <input type="number" id="restInput" value="20">
        <span>分</span>
        <button id="applyAllBtn">全CPに適用</button>
      </div>

      <div class="cp-rest-title">CPごとの休憩時間（分）</div>
      <div id="cpRestContainer"></div>

      <div>標高間隔（m）</div>
      <input type="number" id="contourInput" value="100">

      <div>疲労による速度の減衰①</div>
      <input type="number" id="decayKm1" value="100"> km
      <input type="number" id="decayRate1" value="10"> %

      <div>疲労による速度の減衰②</div>
      <input type="number" id="decayKm2" value="200"> km
      <input type="number" id="decayRate2" value="30"> %

      <button id="startSetupBtn">設定</button>
    </div>
  </div>

  <div id="map"></div>

  <div id="status"></div>

  <!-- ボタン -->
  <button id="startBtn" class="hidden">▶</button>

  <div id="controlButtonsTop">
    <button id="configBtn" class="hidden">⚙️</button>
    <button id="cpListBtn" class="hidden">📊</button>
    <button id="updateBtn" class="hidden">↻</button>
    <button id="tagBtn" class="hidden">Tag</button>
  </div>
  <div id="controlButtonsRightUp">
    <button id="saveBtn" class="hidden">💾</button>
    <button id="endBtn" class="hidden">■</button>
  </div>
  <div id="controlButtonsRightDown">
    <button id="listBtn" class="hidden">📋</button>
    <button id="elevationBtn" class="hidden">⛰</button>
    <button id="quickBtn" class="hidden">📍</button>
  </div>

  <!-- 標高グラフ -->
  <div id="elevationContainer" class="hidden">
    <canvas id="elevationChart" width="300" height="120"></canvas>
  </div>

  <!-- 情報パネル -->
  <div id="infoPanel" class="panel hidden">

    <div id="courseName" class="panel-title"></div>

    <div class="panel-section">
      <div class="panel-title">⏱ 時間</div>
      <div id="timeInfo"></div>
    </div>

    <div class="panel-section">
      <div class="panel-title">📍 現在</div>
      <div id="progress"></div>
      <div id="remaining"></div>
    </div>

    <div class="panel-section">
      <div class="panel-title">🚩 次の目的地</div>
      <div id="next"></div>
    </div>

    <div class="panel-section">
      <div class="panel-title">⏱ ゴール時間</div>
      <div id="result"></div>
    </div>

  </div>

  <!-- タグメニュー -->
  <div id="tagPanel" class="tag-panel hidden">

    <div class="tag-header">
      <div class="tag-title">📍 タグ選択</div>
      <button id="closeTag" class="close-btn">✕</button>
    </div>

    <div id="tagContainer"></div>

  </div>
  <!-- 記録リスト -->
  <div id="overlayPanels">
    <div id="cpListPanel" class="hidden"></div>
    <div id="recordPanel" class="hidden"></div>
  </div>

  <!-- Leaflet -->
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <!-- JS -->
  <script src="script.js"></script>
</body>
</html>
